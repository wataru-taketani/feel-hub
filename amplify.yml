version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E '^(NEXT_PUBLIC_|SUPABASE_|ENCRYPTION_KEY|LINE_)' >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
